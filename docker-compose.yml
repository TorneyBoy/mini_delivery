services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: delivery-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: mima0221
      MYSQL_DATABASE: delivery
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/src/main/resources/db/rebuild_database.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - delivery-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot 后端服务
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile.local
    container_name: delivery-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/delivery?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: mima0221
      TZ: Asia/Shanghai
      # 文件上传路径配置
      FILE_UPLOAD_PATH: /data/upload/
    ports:
      - "8081:8081"
    volumes:
      # 图片文件持久化存储
      - upload_data:/data/upload
    networks:
      - delivery-network

  # Nginx 反向代理（生产环境使用）
  nginx:
    image: nginx:alpine
    container_name: delivery-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/ssl:/etc/nginx/ssl
      # 挂载图片目录，供Nginx直接提供静态文件服务
      - upload_data:/data/upload:ro
    depends_on:
      - backend
    networks:
      - delivery-network

volumes:
  mysql_data:
  upload_data:


networks:
  delivery-network:
    driver: bridge
