server:
  port: 8081

spring:
  application:
    name: mini-delivery
    
  # 数据源配置 - 支持环境变量
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/delivery?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:mima0221}
    
  # Redis配置
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:}
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.delivery.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT配置
jwt:
  secret: mini-delivery-jwt-secret-key-2024-very-long-secret-key
  expiration: 86400000  # 24小时
  header: Authorization
  prefix: Bearer 

# 微信小程序配置
wechat:
  miniapp:
    appid: wx7be647a0980c25fb
    secret: 137ed7fb557cc86cb2ffa624699c4a08
    token: your-token
    aesKey: your-aesKey
  # 微信支付配置（需要配置真实的商户信息后启用）
  # pay:
  #   appid: your-appid
  #   mchId: your-mchId
  #   apiV3Key: your-apiV3Key
  #   privateKeyPath: classpath:apiclient_key.pem
  #   merchantSerialNumber: your-serial-number
  #   notifyUrl: https://your-domain.com/api/pay/notify
  # 订阅消息模板ID
  message:
    template:
      # 账单生成通知模板
      bill-created: your-bill-created-template-id
      # 订单分配通知模板
      order-assigned: your-order-assigned-template-id
      # 订单状态变更通知模板
      order-status: your-order-status-template-id
      # 送货完成通知模板
      delivery-complete: your-delivery-complete-template-id
      # 支付成功通知模板
      payment-success: your-payment-success-template-id

# 文件上传配置
file:
  upload:
    path: ./data/upload/
    max-size: 10MB

# 阿里云OSS配置（可选，用于生产环境图片存储）
aliyun:
  oss:
    # 是否启用OSS，默认false使用本地存储
    enabled: false
    # OSS endpoint，如：oss-cn-hangzhou.aliyuncs.com
    endpoint: ${ALIYUN_OSS_ENDPOINT:}
    # AccessKey ID
    access-key-id: ${ALIYUN_ACCESS_KEY_ID:}
    # AccessKey Secret
    access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET:}
    # Bucket名称
    bucket-name: ${ALIYUN_OSS_BUCKET_NAME:}
    # 自定义域名（可选，需要在OSS控制台绑定域名）
    custom-domain: ${ALIYUN_OSS_CUSTOM_DOMAIN:}

# 美团开放平台配置
meituan:
  api:
    base-url: https://waimaiopen.meituan.com/api/v1
    app-key: 148864
    app-secret: f933a5711f4a8bc970d95a9af54d973e
    # 门店ID（需要先在美团开放平台创建门店）
    store-id: 26979003

# 日志配置
logging:
  level:
    com.delivery: debug
    org.springframework.security: info
